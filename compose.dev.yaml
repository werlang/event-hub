services:
    api:
        build: ./api
        restart: unless-stopped
        volumes:
            - ./api:/app
            - node_modules_api:/app/node_modules
        working_dir: /app
        env_file:
            - .env
        ports:
            - 3000:3000
            - 9229:9229
        command: npm run development
        dns:
            - 8.8.8.8
            - 8.8.4.4
        sysctls:
            - net.ipv6.conf.all.disable_ipv6=1
        depends_on:
            - mysql
    web:
        build: ./web
        restart: unless-stopped
        volumes:
            - ./web:/app
            - node_modules_web:/app/node_modules
        working_dir: /app
        env_file:
            - .env
        ports:
            - 80:80 # webpack dev server
        command: npm run development
        depends_on:
            - api
    mysql:
        image: mysql:8.2
        restart: unless-stopped
        environment:
            - MYSQL_DATABASE=${MYSQL_DATABASE}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        ports:
            - 3306:3306
        volumes:
            - mysql:/var/lib/mysql
            - .:/app
volumes:
    node_modules_web:
    node_modules_api:
    mysql:
